name: Portfolio Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/751062269307/locations/global/workloadIdentityPools/github-pool/providers/github-provider-v2
          service_account: githubactions@project-a0d9d954-ea3e-4055-bea.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy website to Cloud Storage
        run: |
          gcloud storage rsync . gs://gcp-github-action \
          --recursive \
          --delete-unmatched-destination-objects
